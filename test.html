<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Image Preview</title></head>
<body>

  <h2>1. Natural size (no CSS)</h2>
  <img src="https://templated-assets.s3.amazonaws.com/public/thumbnail/50f718b2-4815-468e-a7af-fa7db77f10dd.webp" alt="">

  <hr>

  <h2>2. Constrained to 300px column width, height auto</h2>
  <div style="width: 300px; border: 1px solid #ccc; border-radius: 8px; overflow: hidden;">
    <img
      src="https://templated-assets.s3.amazonaws.com/public/thumbnail/50f718b2-4815-468e-a7af-fa7db77f10dd.webp"
      alt=""
      style="display: block; width: 100%; height: auto;"
    >
  </div>

  <hr>

  <h2>3. Full width of page, height auto</h2>
  <div style="width: 100%; border: 1px solid #ccc; border-radius: 8px; overflow: hidden;">
    <img
      src="https://templated-assets.s3.amazonaws.com/public/thumbnail/50f718b2-4815-468e-a7af-fa7db77f10dd.webp"
      alt=""
      style="display: block; width: 100%; height: auto;"
    >
  </div>

</body>
</html>
